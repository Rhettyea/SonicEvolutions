<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SonicEvolutions</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            background: #87CEEB; /* Green Hill Sky */
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game Core States
let gameState = 'MENU'; 
let level = 1;
let score = 0;
let keys = {};

// Character Roster
let selectedCharacter = 0;
const characters = [
    { name: "Sonic", speed: 6, sprint: 12, punch: 15, color: "#0000FF", superColor: "#FFFF00" },
    { name: "Shadow", speed: 5, sprint: 11, punch: 25, color: "#333333", superColor: "#FFFF00" },
    { name: "Knuckles", speed: 4, sprint: 8, punch: 40, color: "#FF0000", superColor: "#FFFF00" }
];

// Boss Rotation (Every 5 Levels)
const BOSS_NAMES = {
    5: "Dr. Eggman",
    10: "Rival Knuckles",
    15: "Ultimate Shadow",
    20: "Eggman Form 2",
    25: "Metal Sonic",
    30: "Final Hazard",
    35: "Master Core"
};

// Player Setup
let player = { x: 100, y: 480, width: 40, height: 50 };
let playerHp = 100;
let isSprinting = false;
let isSpindashing = false;
let spindashTimer = 0;
let isPunching = false;
let punchTimer = 0;

// Emerald & Super Progression Systems
let emeraldsCollected = 0;
let isSuperSonic = false;
let emeraldOrbitalAngle = 0; 
const EMERALD_COLORS = ["#FF0000", "#00FF00", "#0000FF", "#FFFF00", "#FF00FF", "#00FFFF", "#FFFFFF"];

// Entity Tracking
let enemies = [];
let boss = null;
let bossHp = 0;
let bossMaxHp = 100;

// Key Handlers
window.addEventListener("keydown", (e) => {
    // Prevent spacebar and arrows from scrolling the browser window
    if(["space", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) {
        e.preventDefault();
    }
    keys[e.key.toLowerCase()] = true;
    handleKeyDown(e.key);
});

window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

function handleKeyDown(key) {
    if (gameState === 'MENU') {
        if (key === 'ArrowLeft') {
            selectedCharacter = (selectedCharacter - 1 + characters.length) % characters.length;
        } else if (key === 'ArrowRight') {
            selectedCharacter = (selectedCharacter + 1) % characters.length;
        } else if (key === 'Enter') {
            gameState = 'PLAYING';
            setupLevel();
        }
    } else if (gameState === 'PLAYING') {
        if (key === ' ') {
            isSprinting = !isSprinting; // Toggle walking/sprinting
        }
        if (key === 'ArrowDown' && (keys['arrowleft'] || keys['arrowright'])) {
            isSpindashing = true;
            spindashTimer = 30; 
        }
        if (key === 'f' && !isSpindashing) {
            isPunching = true;
            punchTimer = 15;
        }
    } else if (gameState === 'GAME_OVER' || gameState === 'VICTORY') {
        if (key === 'Enter') {
            gameState = 'MENU';
            level = 1;
            playerHp = 100;
            score = 0;
            emeraldsCollected = 0;
            isSuperSonic = false;
        }
    }
}

function setupLevel() {
    enemies = [];
    boss = null;

    // Trigger Super Form if player holds all 7 Emeralds
    if (emeraldsCollected >= 7) {
        isSuperSonic = true;
    }

    if (BOSS_NAMES[level]) {
        bossMaxHp = level * 60;
        bossHp = bossMaxHp;
        boss = { x: 650, y: 450, width: 60, height: 80 };
    } else {
        let numSpuniks = 3 + level;
        for (let i = 0; i < numSpuniks; i++) {
            enemies.push({
                x: Math.random() * 450 + 300,
                y: 500,
                width: 30,
                height: 30,
                speed: Math.random() * 2 + 2,
                hp: 10 + (level * 2)
            });
        }
    }
}

function update() {
    if (gameState !== 'PLAYING') return;

    let char = characters[selectedCharacter];
    
    let currentSpeed = isSprinting ? char.sprint : char.speed;
    if (isSpindashing) currentSpeed *= 1.6;
    if (isSuperSonic) currentSpeed *= 1.5; 

    // Decay attack timers
    if (spindashTimer > 0) {
        spindashTimer--;
        if (spindashTimer === 0) isSpindashing = false;
    }
    if (punchTimer > 0) {
        punchTimer--;
        if (punchTimer === 0) isPunching = false;
    }

    emeraldOrbitalAngle += 0.05;

    // Left/Right Movement Execution
    if (keys['arrowleft'] && player.x > 20) player.x -= currentSpeed;
    if (keys['arrowright'] && player.x < canvas.width - 60) player.x += currentSpeed;

    // Spunik AI Processing
    for (let i = enemies.length - 1; i >= 0; i--) {
        let spunik = enemies[i];
        if (spunik.x > player.x) spunik.x -= spunik.speed;
        else spunik.x += spunik.speed;

        if (checkCollision(player, spunik)) {
            if (isSpindashing || isSuperSonic) { 
                enemies.splice(i, 1);
                score += 10;
            } else if (isPunching) {
                spunik.hp -= char.punch;
                if (spunik.hp <= 0) {
                    enemies.splice(i, 1);
                    score += 15;
                }
            } else {
                playerHp -= 0.4;
                if (playerHp <= 0) gameState = 'GAME_OVER';
            }
        }
    }

    // Boss Battle Processing
    if (boss) {
        if (boss.x > player.x + 50) boss.x -= 2;
        else if (boss.x < player.x - 50) boss.x += 2;

        if (checkCollision(player, boss)) {
            if (isSpindashing || isPunching || isSuperSonic) {
                let dmg = isSuperSonic ? char.punch * 2 : (isPunching ? char.punch : char.punch / 2);
                bossHp -= (dmg / 10); 
                
                if (bossHp <= 0) {
                    boss = null;
                    score += 100;
                    if (emeraldsCollected < 7) emeraldsCollected++;
                    level++;
                    setupLevel();
                }
            } else {
                if (!isSuperSonic) {
                    playerHp -= 0.8;
                    if (playerHp <= 0) gameState = 'GAME_OVER';
                }
            }
        }
    }

    // Progression verification
    if (!boss && enemies.length === 0) {
        level++;
        if (level > 35) gameState = 'VICTORY';
        else setupLevel();
    }
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Render floor profile
    ctx.fillStyle = "#228B22";
    ctx.fillRect(0, 530, canvas.width, 70);

    if (gameState === 'MENU') {
        ctx.fillStyle = "orange";
        ctx.font = "bold 46px Arial";
        ctx.textAlign = "center";
        ctx.fillText("SONICEVOLUTIONS", canvas.width / 2, 150);

        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("Select Your Character:", canvas.width / 2, 240);

        let char = characters[selectedCharacter];
        ctx.fillStyle = char.color;
        ctx.fillRect(canvas.width / 2 - 40, 280, 80, 90);

        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.fillText(char.name, canvas.width / 2, 410);

        ctx.fillStyle = "#FFFF00";
        ctx.font = "20px Arial";
        ctx.fillText("Use LEFT / RIGHT arrows to select. Press ENTER to start.", canvas.width / 2, 480);

    } else if (gameState === 'PLAYING') {
        let char = characters[selectedCharacter];

        // HUD elements
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.textAlign = "left";
        ctx.fillText(`CHARACTER: ${char.name.toUpperCase()}`, 20, 30);
        ctx.fillText(`LEVEL: ${level}`, 20, 60);
        ctx.fillText(`SCORE: ${score}`, 20, 90);
        
        ctx.fillStyle = playerHp < 30 ? "red" : "lime";
        ctx.fillText(`HP: ${Math.max(0, Math.floor(playerHp))}`, 20, 120);

        ctx.fillStyle = "cyan";
        ctx.fillText(`MODE: ${isSprinting ? 'SPRINTING' : 'WALKING'} (SPACE)`, 20, 150);
        ctx.fillStyle = "white";
        ctx.fillText(`EMERALDS: ${emeraldsCollected} / 7`, 20, 180);

        // Render Player Avatar (Color transformations applied)
        ctx.fillStyle = isSuperSonic ? char.superColor : char.color;

        if (isSpindashing) {
            ctx.beginPath();
            ctx.arc(player.x + 20, player.y + 25, 22, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
        } else {
            ctx.fillRect(player.x, player.y, player.width, player.height);
            if (isPunching) {
                ctx.fillStyle = "white";
                ctx.fillRect(player.x + 40, player.y + 15, 20, 10);
            }
        }

        // Project Floating Chaos Emerald Cluster Orbit
        for (let i = 0; i < emeraldsCollected; i++) {
            let angle = emeraldOrbitalAngle + (i * (Math.PI * 2 / 7));
            let radius = 45; 
            let ex = player.x + player.width / 2 + Math.cos(angle) * radius;
            let ey = player.y + player.height / 2 + Math.sin(angle) * radius;

            ctx.fillStyle = EMERALD_COLORS[i];
            ctx.beginPath();
            ctx.moveTo(ex, ey - 8);
            ctx.lineTo(ex + 6, ey);
            ctx.lineTo(ex, ey + 8);
            ctx.lineTo(ex - 6, ey);
            ctx.fill();
            ctx.closePath();
        }

        // Active Super Sonic Aura Fields
        if (isSuperSonic) {
            ctx.strokeStyle = "rgba(255, 255, 0, 0.4)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(player.x + 20, player.y + 25, 30 + Math.sin(emeraldOrbitalAngle*2)*5, 0, Math.PI*2);
            ctx.stroke();
        }

        // Render enemy targets
        ctx.fillStyle = "#800080"; 
        enemies.forEach(spunik => {
            ctx.fillRect(spunik.x, spunik.y, spunik.width, spunik.height);
        });

        // Boss layout render
        if (boss) {
            ctx.fillStyle = "red";
            ctx.font = "bold 24px Arial";
            ctx.textAlign = "center";
            ctx.fillText(`BOSS: ${BOSS_NAMES[level]}`, canvas.width / 2, 40);

            ctx.fillStyle = "#440000";
            ctx.fillRect(canvas.width / 2 - 150, 60, 300, 15);
            
            ctx.fillStyle = "red";
            ctx.fillRect(canvas.width / 2 - 150, 60, 300 * (bossHp / bossMaxHp), 15);

            ctx.fillStyle = "#A52A2A";
            ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
        }

    } else if (gameState === 'GAME_OVER') {
        ctx.fillStyle = "red";
        ctx.font = "bold 60px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, 260);

        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("Press ENTER to return to Menu", canvas.width / 2, 340);

    } else if (gameState === 'VICTORY') {
        ctx.fillStyle = "yellow";
        ctx.font = "bold 55px Arial";
        ctx.textAlign = "center";
        ctx.fillText("SUPER SONIC VICTORY!", canvas.width / 2, 250);

        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 320);
        ctx.fillText("Press ENTER to play again", canvas.width / 2, 390);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
